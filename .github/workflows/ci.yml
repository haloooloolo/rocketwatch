name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "check"
          src: "rocketwatch sentinel"
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "format --check"
          src: "rocketwatch sentinel"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv run --group dev mypy rocketwatch/
      - run: uv run --project sentinel --group dev mypy sentinel/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv run --group test pytest --cov-report=xml
      - uses: codecov/codecov-action@v6
        with:
          files: coverage.xml

  docker:
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Force HTTPS for Git submodules
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: haloooloolo
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: rocketwatch/Dockerfile
          push: true
          tags: haloooloolo/rocketwatch:latest
          no-cache: true
          platforms: linux/amd64

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
