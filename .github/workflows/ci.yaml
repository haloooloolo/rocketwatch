name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v4.1.0
        with:
          args: "check"
          src: "rocketwatch sentinel"
      - uses: astral-sh/ruff-action@v4.1.0
        with:
          args: "format --check"
          src: "rocketwatch sentinel"
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          cache-suffix: lint
      - run: uv lock --check
      - run: uv lock --check --project sentinel

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          cache-suffix: typecheck
      - run: uv run --group dev mypy rocketwatch/
      - run: uv run --project sentinel --group dev mypy sentinel/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          cache-suffix: test
      - run: uv run --group test pytest --cov-report=xml
      - uses: codecov/codecov-action@v7
        with:
          files: coverage.xml

  docker:
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: rocketwatch/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
