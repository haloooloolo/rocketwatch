repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: uv-lock-check
        name: uv lock (rocketwatch)
        entry: uv lock --check
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
      - id: uv-lock-check-sentinel
        name: uv lock (sentinel)
        entry: uv lock --check --project sentinel
        language: system
        pass_filenames: false
        files: ^sentinel/(pyproject\.toml|uv\.lock)$
      - id: pytest
        name: pytest
        entry: uv run --group test pytest -x -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: mypy
        name: mypy (rocketwatch)
        entry: uv run --group test mypy rocketwatch/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: mypy-sentinel
        name: mypy (sentinel)
        entry: uv run --project sentinel --group dev mypy --config-file sentinel/pyproject.toml sentinel/
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
